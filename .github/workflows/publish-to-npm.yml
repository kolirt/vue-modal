name: 🚀 publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    steps:
      - name: 📚 Checkout
        uses: actions/checkout@v4

      - name: 📦 Pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 🟢 Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: 🕵 Install
        run: pnpm install --frozen-lockfile

      - name: 🧹 Lint
        run: pnpm --filter @kolirt/vue-modal run lint

      - name: 🔎 Type-check
        run: pnpm --filter @kolirt/vue-modal run type-check

      - name: 🏗 Build
        run: pnpm --filter @kolirt/vue-modal run build

      - name: 📄 Copy README, LICENSE & AGENTS into package
        run: cp README.md LICENSE AGENTS.md packages/core/

      - name: 🚀 Publish
        run: npm publish --provenance --access public
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
