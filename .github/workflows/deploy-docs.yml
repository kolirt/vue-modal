name: 📝 deploy docs

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    name: 🚀 Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 📚 Checkout
        uses: actions/checkout@v4

      - name: 📦 Pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 🟢 Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 🕵 Install
        run: pnpm install --frozen-lockfile

      - name: 🏗 Build lib
        run: pnpm --filter @kolirt/vue-modal run build

      - name: 📄 Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: 🏗 Generate docs
        run: pnpm --filter docs run generate
        env:
          NUXT_APP_BASE_URL: ${{ steps.pages.outputs.base_path }}/

      - name: 📦 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/.output/public

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
